<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrador - Shark Tank Energía Grupo EPM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --epm-green: #00A859;
    --epm-green-light: #00D26A;
    --epm-green-dark: #007A41;
    --epm-yellow: #FDB913;
    --epm-blue: #0033A0;
    --bg-main: #F4F7F9;
    --bg-card: #FFFFFF;
    --border-light: #E2E8F0;
    --border-medium: #CBD5E1;
    --text-main: #1E293B;
    --text-muted: #64748B;
    --text-heading: #0F172A;
    --shadow-soft: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-medium: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
    --shadow-heavy: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);

    /* Colores del podio */
    --gold: #FDB913;
    --gold-dark: #C8930A;
    --silver: #C0C4CC;
    --silver-dark: #8B8E94;
    --bronze: #CD7F32;
    --bronze-dark: #8E5A24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    padding: 30px 15px;
    background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
    background-size: 30px 30px;
    background-attachment: fixed;
}

h1, h2, h3, .brand-font { font-family: 'Montserrat', sans-serif; }

.container {
    max-width: 1280px;
    margin: 0 auto;
    background: var(--bg-card);
    padding: 40px;
    border-radius: 24px;
    box-shadow: var(--shadow-heavy);
    border: 1px solid var(--border-light);
    position: relative;
    overflow: hidden;
}

.container::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, var(--epm-green), var(--epm-blue), var(--epm-yellow));
}

/* HEADER */
.header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border-light); padding-bottom: 25px; margin-bottom: 35px;
    flex-wrap: wrap; gap: 20px;
}
.title-section h1 {
    font-size: 32px; font-weight: 900; letter-spacing: -1px;
    color: var(--text-heading); line-height: 1.1;
}
.title-section h1 span { color: var(--epm-green); }
.title-section .subtitle {
    color: var(--text-muted); font-size: 14px; margin-top: 6px;
    font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
}
.title-section .subtitle .admin-badge {
    background: var(--epm-blue); color: #FFF;
    padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 800; letter-spacing: 1px;
}
.logo-epm-css {
    background: var(--epm-green); color: #FFF;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 24px;
    padding: 8px 22px;
    border-radius: 14px 14px 14px 4px;
    box-shadow: var(--shadow-soft);
    display: flex; align-items: center; justify-content: center; line-height: 1;
}
.logo-epm-css span {
    font-weight: 400; margin-right: 4px; font-size: 18px;
}

/* TABS */
.nav-tabs {
    display: flex; gap: 15px; margin-bottom: 40px;
    background: #F1F5F9; padding: 8px; border-radius: 16px;
    border: 1px solid var(--border-light);
    flex-wrap: wrap;
}
.tab-btn {
    flex: 1; min-width: 180px; padding: 14px 18px;
    background: transparent; color: var(--text-muted);
    border: none; border-radius: 10px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: all 0.25s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'Montserrat', sans-serif;
}
.tab-btn:hover { color: var(--epm-green-dark); }
.tab-btn.active {
    background: var(--epm-green); color: #FFF;
    box-shadow: 0 4px 14px rgba(0,168,89,0.3);
}
.tab-btn i { font-size: 16px; }

.view-section { display: none; }
.view-section.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* === KPI CARDS === */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-bottom: 35px;
}
.kpi-card {
    background: #FFFFFF;
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-medium);
}
.kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--epm-green);
}
.kpi-card.blue::before { background: var(--epm-blue); }
.kpi-card.yellow::before { background: var(--epm-yellow); }
.kpi-card.purple::before { background: #8B5CF6; }

.kpi-label {
    font-size: 11px; font-weight: 800; letter-spacing: 1.2px;
    color: var(--text-muted); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
}
.kpi-label i {
    color: var(--epm-green); font-size: 14px;
}
.kpi-card.blue .kpi-label i { color: var(--epm-blue); }
.kpi-card.yellow .kpi-label i { color: var(--epm-yellow); }
.kpi-card.purple .kpi-label i { color: #8B5CF6; }

.kpi-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 36px; font-weight: 900;
    color: var(--text-heading);
    line-height: 1;
}
.kpi-sub {
    font-size: 12px; color: var(--text-muted);
    margin-top: 6px; font-weight: 600;
}

/* === FILTROS === */
.filters-bar {
    background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 28px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
}
.filters-bar label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 12px;
    color: var(--text-heading); text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
}
.filters-bar label i { color: var(--epm-green); }

.filter-pills {
    display: flex; gap: 8px; flex-wrap: wrap;
}
.filter-pill {
    background: #FFF;
    border: 1px solid var(--border-medium);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 6px;
}
.filter-pill:hover {
    border-color: var(--epm-green);
    color: var(--epm-green-dark);
    background: #F0FDF4;
}
.filter-pill.active {
    background: var(--epm-green);
    color: #FFF;
    border-color: var(--epm-green);
    box-shadow: 0 3px 10px rgba(0,168,89,0.25);
}

.search-input {
    flex: 1; min-width: 200px;
    padding: 10px 14px;
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
}
.search-input:focus {
    border-color: var(--epm-green);
    box-shadow: 0 0 0 3px rgba(0,168,89,0.15);
}

/* === PODIO === */
.segment-podiums {
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.podium-section {
    background: #FFFFFF;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 30px;
    box-shadow: var(--shadow-soft);
}

.podium-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--border-light);
    flex-wrap: wrap; gap: 14px;
}

.podium-section-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 22px;
    color: var(--text-heading);
    display: flex; align-items: center; gap: 14px;
}
.podium-section-title .segment-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--epm-green), var(--epm-green-dark));
    color: #FFF;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(0,168,89,0.3);
}
.podium-section-meta {
    display: flex; gap: 18px;
    font-size: 12px; color: var(--text-muted); font-weight: 700;
}
.podium-section-meta span {
    display: flex; align-items: center; gap: 6px;
}

/* Estructura del podio */
.podium-container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: end;
    gap: 18px;
    max-width: 850px;
    margin: 0 auto 30px;
    min-height: 320px;
}

.podium-place {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.podium-card {
    background: #FFFFFF;
    border: 2px solid var(--border-light);
    border-radius: 16px;
    padding: 18px 14px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow-medium);
    transition: transform 0.3s ease;
    position: relative;
    z-index: 2;
}
.podium-card:hover {
    transform: translateY(-6px);
}

.podium-medal {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 24px;
    color: #FFF;
    margin: -42px auto 12px;
    border: 4px solid #FFF;
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    position: relative;
}
.podium-medal::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, rgba(255,255,255,0.5), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

.podium-logo {
    width: 70px; height: 70px;
    margin: 0 auto 10px;
    object-fit: contain;
    object-position: center;
}
.podium-logo-fallback {
    width: 70px; height: 70px;
    margin: 0 auto 10px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--epm-green), var(--epm-green-dark));
    color: #FFF;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 18px;
}

.podium-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 14px;
    color: var(--text-heading);
    line-height: 1.2;
    margin-bottom: 10px;
    min-height: 34px;
    display: flex; align-items: center; justify-content: center;
}

.podium-score {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 32px;
    color: var(--epm-green-dark);
    line-height: 1;
}
.podium-score-sub {
    font-size: 11px; color: var(--text-muted);
    font-weight: 600; margin-top: 2px;
}

.podium-chips {
    display: flex; gap: 5px; justify-content: center;
    margin-top: 10px; flex-wrap: wrap;
}
.podium-chip {
    font-size: 9px; padding: 3px 7px;
    border-radius: 6px; font-weight: 800;
    letter-spacing: 0.3px;
}
.podium-chip.shark {
    background: rgba(0,168,89,0.12);
    color: var(--epm-green-dark);
}
.podium-chip.publico {
    background: rgba(0,51,160,0.10);
    color: var(--epm-blue);
}

/* Base del podio (escalón visual) */
.podium-base {
    width: 100%;
    border-radius: 12px 12px 0 0;
    margin-top: -4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 42px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 1;
}

/* Primer lugar - el más alto */
.podium-place.first {
    order: 2;
}
.podium-place.first .podium-medal {
    background: linear-gradient(135deg, #FDE08D, var(--gold), var(--gold-dark));
}
.podium-place.first .podium-base {
    height: 130px;
    background: linear-gradient(180deg, var(--gold), var(--gold-dark));
}
.podium-place.first .podium-card {
    border-color: var(--gold);
    background: linear-gradient(180deg, #FFFAEB, #FFFFFF);
}
.podium-place.first .podium-score {
    color: var(--gold-dark);
}

/* Segundo lugar - izquierda */
.podium-place.second {
    order: 1;
}
.podium-place.second .podium-medal {
    background: linear-gradient(135deg, #E2E5EA, var(--silver), var(--silver-dark));
}
.podium-place.second .podium-base {
    height: 90px;
    background: linear-gradient(180deg, var(--silver), var(--silver-dark));
}
.podium-place.second .podium-card {
    border-color: var(--silver);
}

/* Tercer lugar - derecha */
.podium-place.third {
    order: 3;
}
.podium-place.third .podium-medal {
    background: linear-gradient(135deg, #E8B68C, var(--bronze), var(--bronze-dark));
}
.podium-place.third .podium-base {
    height: 60px;
    background: linear-gradient(180deg, var(--bronze), var(--bronze-dark));
}
.podium-place.third .podium-card {
    border-color: var(--bronze);
}

/* Corona sobre el primer lugar */
.podium-place.first .podium-card::before {
    content: '\f521';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%) rotate(-12deg);
    font-size: 28px;
    color: var(--gold);
    text-shadow: 0 3px 8px rgba(253,185,19,0.5);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateX(-50%) rotate(-12deg) translateY(0); }
    50% { transform: translateX(-50%) rotate(-12deg) translateY(-6px); }
}

/* Tabla del resto del ranking del segmento */
.segment-rest-list {
    margin-top: 18px;
    border-top: 1px dashed var(--border-medium);
    padding-top: 18px;
}
.segment-rest-list-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
}
.rest-row {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 10px 14px;
    background: #F8FAFC;
    border-radius: 10px;
    margin-bottom: 6px;
    transition: background 0.2s;
}
.rest-row:hover {
    background: #F1F5F9;
}
.rest-position {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 16px;
    color: var(--text-muted);
    text-align: center;
}
.rest-name {
    font-weight: 700; color: var(--text-heading); font-size: 14px;
}
.rest-name-sub {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
}
.rest-score {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 18px;
    color: var(--epm-green-dark);
}
.rest-votes {
    font-size: 11px; color: var(--text-muted);
    background: #FFF;
    border: 1px solid var(--border-medium);
    padding: 4px 10px;
    border-radius: 8px;
    font-weight: 700;
}

.empty-segment {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-weight: 600;
    background: #F8FAFC;
    border-radius: 12px;
    border: 1px dashed var(--border-medium);
}

/* === TABLA DE REGISTROS === */
.records-table-container {
    background: #FFF;
    border: 1px solid var(--border-light);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
}

.records-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.records-table thead {
    background: linear-gradient(135deg, var(--epm-green-dark), var(--epm-green));
    color: #FFF;
}
.records-table thead th {
    padding: 14px 12px;
    text-align: left;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    white-space: nowrap;
}
.records-table tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.15s;
}
.records-table tbody tr:hover {
    background: #F8FAFC;
}
.records-table tbody tr:last-child {
    border-bottom: none;
}
.records-table tbody td {
    padding: 14px 12px;
    color: var(--text-main);
    vertical-align: top;
}
.records-table .cell-date {
    font-size: 11px; color: var(--text-muted); white-space: nowrap;
}
.records-table .cell-eval {
    font-weight: 700; color: var(--text-heading);
}
.records-table .cell-cat-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #FFF;
    background: var(--epm-green);
}
.records-table .cell-cat-badge.publico {
    background: var(--epm-blue);
}
.records-table .cell-empresa {
    font-weight: 700; color: var(--text-heading);
}
.records-table .cell-empresa-sub {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
}
.records-table .cell-score {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--epm-green-dark);
    text-align: center;
}
.records-table .cell-obs {
    font-style: italic;
    color: var(--text-muted);
    font-size: 12px;
    max-width: 320px;
    line-height: 1.4;
}
.records-table .cell-obs.empty {
    color: #CBD5E1;
    font-style: normal;
}

.score-pill {
    display: inline-block;
    background: #F0FDF4;
    border: 1px solid var(--epm-green-light);
    color: var(--epm-green-dark);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 11px;
    min-width: 28px;
    text-align: center;
}

.criteria-mini-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    max-width: 280px;
}
.criteria-mini {
    text-align: center;
    padding: 4px 2px;
    background: #F8FAFC;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
}
.criteria-mini-label {
    font-size: 8px;
    color: var(--text-muted);
    font-weight: 700;
}
.criteria-mini-val {
    font-size: 13px;
    font-weight: 900;
    color: var(--text-heading);
}
.criteria-mini.high .criteria-mini-val { color: var(--epm-green-dark); }
.criteria-mini.mid .criteria-mini-val { color: #EAB308; }
.criteria-mini.low .criteria-mini-val { color: #DC2626; }

/* === COMENTARIOS === */
.comments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 18px;
}
.comment-card {
    background: #FFF;
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 22px;
    box-shadow: var(--shadow-soft);
    transition: transform 0.2s, box-shadow 0.2s;
    border-left: 4px solid var(--epm-green);
    display: flex; flex-direction: column;
}
.comment-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-medium);
}
.comment-card.publico {
    border-left-color: var(--epm-blue);
}
.comment-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-light);
}
.comment-eval-info {
    flex: 1; min-width: 0;
}
.comment-eval-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 14px;
    color: var(--text-heading);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
}
.comment-eval-meta {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
}
.comment-score-big {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 24px;
    color: var(--epm-green-dark);
    background: #F0FDF4;
    padding: 6px 14px;
    border-radius: 10px;
    border: 1px solid var(--epm-green-light);
}
.comment-body {
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.6;
    flex: 1;
    position: relative;
    padding-left: 22px;
}
.comment-body::before {
    content: '"';
    position: absolute;
    left: 0; top: -10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--epm-green-light);
    line-height: 1;
}
.comment-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--border-light);
    font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: center;
}


/* === MAPA DINÁMICO DE INICIATIVAS === */
.strategy-map-layout {
    display: grid;
    grid-template-columns: 255px minmax(0, 1fr);
    gap: 22px;
    align-items: start;
}
.strategy-chart-card,
.strategy-side-card,
.strategy-kpi-panel,
.strategy-comments-panel {
    background: #FFF;
    border: 1px solid var(--border-light);
    border-radius: 18px;
    box-shadow: var(--shadow-soft);
}
.strategy-chart-card {
    padding: 22px;
    min-height: 620px;
    min-width: 0;
}
.strategy-kpi-panel {
    padding: 18px;
    position: sticky;
    top: 18px;
}
.strategy-side-card {
    padding: 22px;
}
.strategy-chart-header {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-light);
}
.strategy-chart-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    color: var(--text-heading);
    font-size: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.strategy-chart-title i { color: var(--epm-green); }
.strategy-chart-subtitle {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    margin-top: 5px;
    line-height: 1.45;
}
.strategy-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
}
.legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--border-light);
    background: #F8FAFC;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 800;
    font-family: 'Montserrat', sans-serif;
}
.legend-symbol {
    width: 12px;
    height: 12px;
    display: inline-block;
    background: var(--epm-green);
}
.legend-symbol.circle { border-radius: 50%; }
.legend-symbol.square { border-radius: 3px; }
.legend-symbol.diamond { transform: rotate(45deg); border-radius: 2px; }
.legend-symbol.triangle {
    width: 0; height: 0; background: transparent;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 13px solid var(--epm-green);
}
.strategy-segment-descriptions {
    margin-top: 16px;
    padding: 14px 16px;
    border: 1px solid var(--border-light);
    border-radius: 14px;
    background: linear-gradient(135deg, #F8FAFC, #FFFFFF);
}
.strategy-segment-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: var(--text-heading);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.strategy-segment-title i { color: var(--epm-green); }
.strategy-segment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
}
.strategy-segment-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border: 1px solid var(--border-light);
    border-radius: 12px;
    background: #FFFFFF;
}
.strategy-segment-item-text strong {
    display: block;
    font-family: 'Montserrat', sans-serif;
    color: var(--text-heading);
    font-size: 11px;
    font-weight: 900;
}
.strategy-segment-item-text span {
    display: block;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 700;
    margin-top: 2px;
}
.strategy-svg-wrap {
    width: 100%;
    height: 500px;
    position: relative;
    cursor: grab;
    user-select: none;
    touch-action: none;
}
.strategy-svg-wrap.panning { cursor: grabbing; }
.strategy-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
}
.strategy-chart-tools {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
}
.strategy-mini-kpis {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-wrap: nowrap;
    justify-content: flex-start;
}
.strategy-mini-kpi {
    min-width: 0;
    width: 100%;
    background: linear-gradient(135deg, #F8FAFC, #FFFFFF);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 10px 12px;
    box-shadow: var(--shadow-soft);
}
.strategy-mini-kpi-label {
    color: var(--text-muted);
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
}
.strategy-mini-kpi-label i { color: var(--epm-green); }
.strategy-mini-kpi-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--text-heading);
    line-height: 1;
    margin-top: 5px;
}
.strategy-mini-kpi-sub {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 700;
    margin-top: 3px;
}
.zoom-controls {
    display: flex;
    gap: 7px;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
}
.zoom-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid var(--border-medium);
    background: #FFFFFF;
    color: var(--text-heading);
    cursor: pointer;
    font-weight: 900;
    box-shadow: var(--shadow-soft);
    transition: all 0.2s ease;
}
.zoom-btn:hover {
    border-color: var(--epm-green);
    color: var(--epm-green-dark);
    transform: translateY(-1px);
}
.zoom-reset {
    width: auto;
    padding: 0 11px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
}
.size-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 800;
    justify-content: flex-end;
}
.size-dot {
    display: inline-block;
    border-radius: 50%;
    background: rgba(0,168,89,0.55);
    border: 2px solid #FFFFFF;
    box-shadow: 0 2px 7px rgba(15, 23, 42, 0.22);
}
.size-dot.small { width: 11px; height: 11px; }
.size-dot.medium { width: 20px; height: 20px; }
.size-dot.large { width: 31px; height: 31px; }
.axis-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 800;
    fill: var(--text-heading);
}
.axis-tick, .grid-line-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    fill: var(--text-muted);
}
.grid-line { stroke: #E2E8F0; stroke-width: 1; }
.axis-line { stroke: #94A3B8; stroke-width: 1.4; }
.quadrant-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 800;
    fill: #94A3B8;
    opacity: 0.75;
}
.marker-shape {
    cursor: pointer;
    fill: rgba(0,168,89,0.72);
    stroke: #FFFFFF;
    stroke-width: 2.5;
    filter: drop-shadow(0 5px 10px rgba(15, 23, 42, 0.22));
    transition: opacity 0.2s ease, transform 0.2s ease;
}
.marker-hit-area { cursor: pointer; fill: rgba(255,255,255,0.001); pointer-events: all; }
.marker-label {
    pointer-events: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 900;
    fill: var(--text-heading);
    paint-order: stroke;
    stroke: #FFFFFF;
    stroke-width: 4px;
    stroke-linejoin: round;
    pointer-events: none;
}
.marker-group:hover .marker-shape { opacity: 0.95; }
.marker-group.selected .marker-shape {
    stroke: var(--epm-yellow);
    stroke-width: 4;
    fill: rgba(0,51,160,0.78);
}
.strategy-axis-window {
    margin: -8px 0 12px;
    padding: 8px 12px;
    border: 1px dashed var(--border-medium);
    border-radius: 12px;
    background: #F8FAFC;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.strategy-axis-window::before {
    content: '\f05a';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    color: var(--epm-green);
}
.strategy-svg-wrap.panning { cursor: grabbing; }
.strategy-svg-wrap.panning .marker-group { pointer-events: none; }

.strategy-side-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    color: var(--text-heading);
    font-size: 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.strategy-side-title i { color: var(--epm-green); }
.selected-project-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--epm-green-dark);
    line-height: 1.2;
    margin-bottom: 5px;
}
.selected-project-meta {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 16px;
}
.metric-stack { display: grid; gap: 10px; margin: 16px 0; }
.metric-row {
    border: 1px solid var(--border-light);
    background: #F8FAFC;
    border-radius: 12px;
    padding: 12px;
}
.metric-row-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
}
.metric-row-value {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--text-heading);
    margin-top: 4px;
}
.metric-row-sub { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.strategy-comments-panel {
    margin-top: 22px;
    padding: 22px;
}
.strategy-comments-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 16px;
}
.strategy-comments-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    color: var(--text-heading);
    display: flex;
    align-items: center;
    gap: 9px;
}
.strategy-comments-title i { color: var(--epm-green); }
.strategy-comments-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
}
.strategy-comment-mini {
    border: 1px solid var(--border-light);
    border-left: 4px solid var(--epm-green);
    background: #FFFFFF;
    border-radius: 12px;
    padding: 14px;
}
.strategy-comment-mini.publico { border-left-color: var(--epm-blue); }
.strategy-comment-mini-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
}
.strategy-comment-mini-name {
    font-weight: 800;
    color: var(--text-heading);
    font-size: 13px;
}
.strategy-comment-mini-body {
    color: var(--text-main);
    font-size: 13px;
    line-height: 1.5;
}
.strategy-empty-hint {
    background: #F8FAFC;
    border: 1px dashed var(--border-medium);
    color: var(--text-muted);
    border-radius: 14px;
    padding: 18px;
    font-size: 13px;
    line-height: 1.5;
}
.strategy-tooltip {
    position: fixed;
    z-index: 50;
    background: #0F172A;
    color: #FFF;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    max-width: 260px;
    box-shadow: var(--shadow-heavy);
    pointer-events: none;
    display: none;
}
.strategy-tooltip strong { font-family: 'Montserrat', sans-serif; }
.strategy-filter-bar {
    margin-bottom: 18px;
}
@media (max-width: 768px) {
    .strategy-chart-tools { align-items: flex-start; }
    .strategy-mini-kpis { justify-content: flex-start; }
    .zoom-controls, .size-legend { justify-content: flex-start; }
}

@media (max-width: 980px) {
    .strategy-map-layout { grid-template-columns: 1fr; }
    .strategy-kpi-panel { position: static; }
    .strategy-mini-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .strategy-chart-card { min-height: auto; }
    .strategy-svg-wrap { height: 430px; }
}

@media (max-width: 768px) {
    .strategy-chart-header { align-items: flex-start; }
    .strategy-legend { justify-content: flex-start; }
    .strategy-svg-wrap { height: 380px; }
    .marker-label {
    pointer-events: none; font-size: 9px; }
}

.generation-guide {

/* === BOTONES === */
.btn {
    padding: 12px 22px;
    border: none;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: 0.3px;
}
.btn-primary {
    background: var(--epm-green); color: #FFF;
    box-shadow: 0 4px 14px rgba(0,168,89,0.25);
}
.btn-primary:hover {
    background: var(--epm-green-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,168,89,0.35);
}
.btn-secondary {
    background: #FFF; color: var(--text-heading);
    border: 1px solid var(--border-medium);
}
.btn-secondary:hover {
    border-color: var(--epm-green);
    color: var(--epm-green-dark);
}

.config-banner {
    background: linear-gradient(135deg, #FEF3C7, #FDE68A);
    border: 1px solid #FCD34D;
    border-left: 4px solid #F59E0B;
    border-radius: 12px;
    padding: 16px 20px;

const DATA_SOURCE_TIMEOUT_MS = 4500;

function normalizeIncomingRows(data) {
    const rows = Array.isArray(data) ? data : (data && Array.isArray(data.rows) ? data.rows : []);
    return rows.map(r => normalizeRow(r)).filter(r => r.segmento && (r.empresa_codigo || r.empresa));
}

function getStaticEvaluationRows() {
    return STATIC_EVALUATION_ROWS.map(r => normalizeRow(r)).filter(r => r.segmento && (r.empresa_codigo || r.empresa));
}

function fetchWithTimeout(url, options = {}, timeoutMs = DATA_SOURCE_TIMEOUT_MS) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, { ...options, signal: controller.signal })
        .finally(() => clearTimeout(timer));
}

function useFallbackRows(reason) {
    console.warn('[Datos] Usando base estática del Excel:', reason || 'sin detalle');
    allRows = getStaticEvaluationRows();
    updateLastSync('Base Excel');
    renderAll();
}

        .replace(/[^A-Z0-9]/g, '');
}

function normalizeSegmentName(segment) {
    const value = String(segment || '').trim();
    if (/generaci/i.test(value)) return 'Generación';
    if (/transmisi|trasmisi/i.test(value)) return 'Transmisión';
    if (/distribuci/i.test(value)) return 'Distribución';
    if (/comercializaci/i.test(value)) return 'Comercialización';
    return value;
}

function resolveCompanyKey(company, segment) {
    const seg = normalizeSegmentName(segment);
    const detailGroup = ALL_SEGMENT_INITIATIVE_DETAILS[seg] || {};
    const key = normalizeCompanyKey(company);
    if (!key) return null;

    const direct = Object.keys(detailGroup).find(k => normalizeCompanyKey(k) === key);
    if (direct) return direct;

    if (key.includes('GUATEMALA')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('GUATEMALA')) || null;
    if (key.includes('ENSA') || key.includes('HET') || key.includes('BONYIC')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('ENSA') || normalizeCompanyKey(k).includes('HET')) || null;
    if (key.includes('AFINIA')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('AFINIA')) || null;
    if (key.includes('CHEC')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('CHEC')) || null;
    if (key.includes('ESSA')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('ESSA')) || null;
    if (key.includes('EDEQ')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('EDEQ')) || null;
    if (key.includes('CENS')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k).includes('CENS')) || null;
    if (key === 'EPM' || key.includes('EPM')) return Object.keys(detailGroup).find(k => normalizeCompanyKey(k) === 'EPM') || null;

    return null;
}

function getCompanyInitiativeDetail(company, segment) {
    const seg = normalizeSegmentName(segment);
    const key = resolveCompanyKey(company, seg);
    return key ? (ALL_SEGMENT_INITIATIVE_DETAILS[seg] || {})[key] : null;
}

function getInitiativeSummary(detail) {
    const iniciativas = detail && Array.isArray(detail.iniciativas) ? detail.iniciativas : [];
    const escalables = iniciativas.filter(i => /si|sí/i.test(i.escalable || '')).length;
    const muyAlto = iniciativas.filter(i => /^\s*muy\s+alto/i.test(i.impacto || '')).length;
    const alto = iniciativas.filter(i => /^\s*alto/i.test(i.impacto || '')).length;
    const nuevaApuesta = iniciativas.filter(i => !/^\s*no\s*$/i.test(i.nuevaApuesta || '') && (i.nuevaApuesta || '').trim()).length;
    return { total: iniciativas.length, escalables, altoImpacto: muyAlto + alto, nuevaApuesta };
}

function getImpactChipClass(text) {
    const clean = String(text || '').toLowerCase();
    if (clean.includes('muy alto') || clean.startsWith('alto')) return 'impact-high';
    if (clean.includes('medio')) return 'impact-medium';
    return '';
}

function getSegmentDetailIcon(segment) {

function loadData() {
    if (!GOOGLE_SHEETS_WEB_APP_URL) {
        document.getElementById('configBanner').style.display = 'flex';
        document.getElementById('podiumsContent').innerHTML = emptyHTML(
            'fa-link-slash', 'Configura la URL del Sheets', 'Pega la URL del Web App en la constante GOOGLE_SHEETS_WEB_APP_URL al inicio del script.'
        );
        document.getElementById('recordsContent').innerHTML = emptyHTML(
            'fa-link-slash', 'Sin conexión', 'No hay datos para mostrar hasta que configures la URL.'
        );
        document.getElementById('commentsContent').innerHTML = emptyHTML(
            'fa-link-slash', 'Sin conexión', 'No hay datos para mostrar hasta que configures la URL.'
        );
        document.getElementById('strategyMapContent').innerHTML = emptyHTML(
            'fa-link-slash', 'Sin conexión', 'No hay datos para mostrar hasta que configures la URL.'
        );
        useFallbackRows('URL no configurada');
        return;
    }

    document.getElementById('podiumsContent').innerHTML = loadingHTML();
    document.getElementById('recordsContent').innerHTML = loadingHTML();
    document.getElementById('commentsContent').innerHTML = loadingHTML();
    document.getElementById('strategyMapContent').innerHTML = loadingHTML();

    const url = GOOGLE_SHEETS_WEB_APP_URL + '?action=getAll&t=' + Date.now();
    fetchWithTimeout(url, { method: 'GET' })
        .then(r => r.json())
        .then(data => {
            const normalized = normalizeIncomingRows(data);
            if (!normalized.length) {
                useFallbackRows('Google Sheets respondió sin registros útiles');
                return;
            }
            allRows = normalized;
            updateLastSync('Google Sheets');
            renderAll();
        })
        .catch(err => {
            console.error('[Sheets] Error:', err);
            useFallbackRows(err && err.name === 'AbortError' ? 'tiempo de espera agotado' : err);
        });
}

function normalizeRow(r) {
    return {
        fecha: r.fecha || r.Fecha || "",
        evaluador: r.evaluador || r.Evaluador || "",
        categoria: r.categoria || r["Categoría"] || r.Categoria || "",

        empresa: r.empresa || r.Empresa || "",
        empresa_codigo: r.empresa_codigo || r["Código Empresa"] || r.empresa || r.Empresa || "",
        c1: numOrEmpty(r.c1 || r["1. Alineación Estratégica"]),
        c2: numOrEmpty(r.c2 || r["2. Viabilidad Técnica"]),
        c3: numOrEmpty(r.c3 || r["3. Viabilidad Financiera"]),
        c4: numOrEmpty(r.c4 || r["4. Impacto Territorial"]),
        c5: numOrEmpty(r.c5 || r["5. Métricas y Trazabilidad"]),
        c6: numOrEmpty(r.c6 || r["6. Innovación"]),

        c8: numOrEmpty(r.c8 || r["8. Calidad del Pitch"]),
        // Campos base para el mapa dinámico. Se dejan robustos por si el formulario nuevo renombró criterios.
        cTech: numOrEmpty(r.cTech || r["1. Viabilidad Técnica"] || r["1. Viabilidad técnica"] || r["2. Viabilidad Técnica"] || r["2. Viabilidad técnica"] || r.c1 || r.c2),
        cFin: numOrEmpty(r.cFin || r["2. Viabilidad Financiera"] || r["2. Viabilidad financiera"] || r["3. Viabilidad Financiera"] || r["3. Viabilidad financiera"] || r.c2 || r.c3),
        cImpact: numOrEmpty(r.cImpact || r["3. Impacto Territorial"] || r["3. Impacto territorial"] || r["4. Impacto Territorial"] || r["4. Impacto territorial"] || r.c3 || r.c4),

function calculateProjectScore(rows) {
    // rows = todas las filas de un mismo proyecto (empresa+segmento)
    const sharks = rows.filter(r => r.categoria === 'SHARK').map(r => r.promedio);
    const publicos = rows.filter(r => r.categoria === 'Público').map(r => r.promedio);

    const sharkAvg = sharks.length ? sharks.reduce((a, b) => a + b, 0) / sharks.length : null;
    const publicoAvg = publicos.length ? publicos.reduce((a, b) => a + b, 0) / publicos.length : null;

    let weightedSum = 0;
    let totalWeight = 0;
    if (sharkAvg !== null) {
        weightedSum += sharkAvg * CATEGORY_WEIGHTS["SHARK"];
        totalWeight += CATEGORY_WEIGHTS["SHARK"];
    }
    if (publicoAvg !== null) {
        weightedSum += publicoAvg * CATEGORY_WEIGHTS["Público"];
        totalWeight += CATEGORY_WEIGHTS["Público"];
    }
    const weighted = totalWeight > 0
        ? weightedSum / totalWeight
        : rows.reduce((a, b) => a + b.promedio, 0) / rows.length;

    return {
        weighted: weighted,
        sharkAvg: sharkAvg,
        publicoAvg: publicoAvg,
        sharkCount: sharks.length,
        publicoCount: publicos.length,
        total: rows.length
    };
}

function getProjectsBySegment(segment) {
    // Agrupa filas por empresa dentro de un segmento
    const grouped = {};
    allRows.filter(r => r.segmento === segment).forEach(r => {
        const key = r.empresa_codigo;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(r);
    });

    const projects = Object.keys(grouped).map(empCode => {
        const rows = grouped[empCode];
        const score = calculateProjectScore(rows);
        return {
            empresa_codigo: empCode,
            empresa: getDisplayName(empCode),
            ...score
        };
    });

    projects.sort((a, b) => b.weighted - a.weighted);
    return projects;
}

function formatDate(d) {
    if (!d) return '—';
    const date = new Date(d);
    if (isNaN(date.getTime())) return String(d);
    const dd = String(date.getDate()).padStart(2, '0');
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const yy = date.getFullYear();
    const hh = String(date.getHours()).padStart(2, '0');
    const mi = String(date.getMinutes()).padStart(2, '0');
    return `${dd}/${mm}/${yy}<br><span style="opacity:0.7;">${hh}:${mi}</span>`;
}

// MAPA DINÁMICO DE INICIATIVAS
// ============================================================
function getWeightedCriterion(rows, field) {
    const sharks = rows.filter(r => r.categoria === 'SHARK').map(r => parseFloat(r[field])).filter(v => !isNaN(v));
    const publicos = rows.filter(r => r.categoria === 'Público').map(r => parseFloat(r[field])).filter(v => !isNaN(v));

    const sharkAvg = sharks.length ? sharks.reduce((a, b) => a + b, 0) / sharks.length : null;
    const publicoAvg = publicos.length ? publicos.reduce((a, b) => a + b, 0) / publicos.length : null;

    let weightedSum = 0;
    let totalWeight = 0;
    if (sharkAvg !== null) {
        weightedSum += sharkAvg * CATEGORY_WEIGHTS["SHARK"];
        totalWeight += CATEGORY_WEIGHTS["SHARK"];
    }
    if (publicoAvg !== null) {
        weightedSum += publicoAvg * CATEGORY_WEIGHTS["Público"];
        totalWeight += CATEGORY_WEIGHTS["Público"];
    }

    return {
        weighted: totalWeight > 0 ? weightedSum / totalWeight : null,
        sharkAvg,
        publicoAvg,
        sharkCount: sharks.length,
        publicoCount: publicos.length
    };
}

function getStrategyProjects() {
    const grouped = {};
    allRows.forEach(r => {
        const key = `${r.empresa_codigo || r.empresa}-${r.segmento}`;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(r);
    });

    return Object.keys(grouped).map(key => {
        const rows = grouped[key];
        const first = rows[0];
        const score = calculateProjectScore(rows);
        const tech = getWeightedCriterion(rows, 'cTech');
        const fin = getWeightedCriterion(rows, 'cFin');
        const impact = getWeightedCriterion(rows, 'cImpact');
        const comments = rows.filter(r => r.observaciones && r.observaciones.trim());
        return {
            key,
            empresa_codigo: first.empresa_codigo,
            empresa: getDisplayName(first.empresa_codigo || first.empresa),
            segmento: first.segmento || 'Sin segmento',
            x: tech.weighted,
            y: fin.weighted,
            sizeValue: impact.weighted,
            tech,
            fin,
            impact,
            score,
            rows,
            comments
        };
    }).filter(p => p.x !== null && p.y !== null && p.sizeValue !== null)
      .sort((a, b) => b.score.weighted - a.score.weighted);
}

function renderStrategySvg(projects) {
    const W = 920, H = 500;
    const margin = { left: 76, right: 36, top: 34, bottom: 70 };
    const plotW = W - margin.left - margin.right;
    const plotH = H - margin.top - margin.bottom;
    const domain = getStrategyDomain();
    const xRange = domain.xMax - domain.xMin;
    const yRange = domain.yMax - domain.yMin;
    const zoomLevel = getStrategyZoomLevel();

    const xScale = v => margin.left + ((v - domain.xMin) / xRange) * plotW;
    const yScale = v => margin.top + (1 - ((v - domain.yMin) / yRange)) * plotH;
    const inDomain = p => p.x >= domain.xMin && p.x <= domain.xMax && p.y >= domain.yMin && p.y <= domain.yMax;
    const visibleProjects = projects.filter(inDomain);
    const impacts = visibleProjects.length
        ? visibleProjects.map(p => p.sizeValue).filter(v => !isNaN(v))
        : projects.map(p => p.sizeValue).filter(v => !isNaN(v));
    const minImpact = Math.min(...impacts);
    const maxImpact = Math.max(...impacts);

    // El tamaño se recalibra con el impacto visible y también responde al zoom,
    // pero con límite para evitar que tape todo el mapa.
    const zoomSizeFactor = Math.min(1.35, 0.88 + Math.log2(Math.max(1, zoomLevel)) * 0.16);
    const minR = 9 * zoomSizeFactor;
    const maxR = 42 * zoomSizeFactor;
    const rScale = v => {
        if (!isFinite(minImpact) || !isFinite(maxImpact)) return 23 * zoomSizeFactor;
        if (Math.abs(maxImpact - minImpact) < 0.001) return 25 * zoomSizeFactor;
        return minR + ((v - minImpact) / (maxImpact - minImpact)) * (maxR - minR);
    };

    const xTicks = niceStrategyTicks(domain.xMin, domain.xMax, 5);
    const yTicks = niceStrategyTicks(domain.yMin, domain.yMax, 5);

    let grid = '';
    xTicks.forEach(t => {
        const x = xScale(t);
        if (x < margin.left - 1 || x > W - margin.right + 1) return;
        grid += `<line class="grid-line" x1="${x}" y1="${margin.top}" x2="${x}" y2="${H - margin.bottom}"></line>`;
        grid += `<text class="axis-tick" x="${x}" y="${H - margin.bottom + 24}" text-anchor="middle">${formatAxisTick(t)}</text>`;
    });
    yTicks.forEach(t => {
        const y = yScale(t);
        if (y < margin.top - 1 || y > H - margin.bottom + 1) return;
        grid += `<line class="grid-line" x1="${margin.left}" y1="${y}" x2="${W - margin.right}" y2="${y}"></line>`;
        grid += `<text class="axis-tick" x="${margin.left - 20}" y="${y + 4}" text-anchor="end">${formatAxisTick(t)}</text>`;
    });

    let quadrantLabels = '';
    if (domain.xMin <= 3 && domain.xMax >= 3 && domain.yMin <= 3 && domain.yMax >= 3) {
        quadrantLabels += `<line class="grid-line" x1="${xScale(3)}" y1="${margin.top}" x2="${xScale(3)}" y2="${H - margin.bottom}" stroke-dasharray="6 6"></line>`;
        quadrantLabels += `<line class="grid-line" x1="${margin.left}" y1="${yScale(3)}" x2="${W - margin.right}" y2="${yScale(3)}" stroke-dasharray="6 6"></line>`;
    }
    if (domain.xMax > 3.35 && domain.yMax > 3.65) {
        quadrantLabels += `<text class="quadrant-label" x="${xScale(Math.min(4.25, domain.xMax - 0.1))}" y="${yScale(Math.min(4.65, domain.yMax - 0.12))}" text-anchor="middle">Zona ideal</text>`;
    }
    if (domain.xMin < 2.2 && domain.yMin < 2.2) {
        quadrantLabels += `<text class="quadrant-label" x="${xScale(Math.max(1.35, domain.xMin + 0.25))}" y="${yScale(Math.max(1.25, domain.yMin + 0.2))}">Zona crítica</text>`;
    }

    let markers = '';
    projects.forEach((p, idx) => {
        if (!inDomain(p)) return;
        const x = xScale(p.x);
        const y = yScale(p.y);
        const r = rScale(p.sizeValue);
        const shape = getSegmentShape(p.segmento);
        const selected = p.key === selectedStrategyProjectKey ? ' selected' : '';
        const label = makeShortLabel(p.empresa, idx + 1);
        markers += renderMarkerShape(p, x, y, r, shape, selected, label);
    });

    return `<svg class="strategy-svg" id="strategySvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
            <clipPath id="strategyPlotClip"><rect x="${margin.left}" y="${margin.top}" width="${plotW}" height="${plotH}" rx="14"></rect></clipPath>
        </defs>
        <rect x="${margin.left}" y="${margin.top}" width="${plotW}" height="${plotH}" rx="14" fill="#F8FAFC" stroke="#E2E8F0"></rect>
        ${grid}
        ${quadrantLabels}
        <line class="axis-line" x1="${margin.left}" y1="${H - margin.bottom}" x2="${W - margin.right}" y2="${H - margin.bottom}"></line>
        <line class="axis-line" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${H - margin.bottom}"></line>
        <text class="axis-label" x="${margin.left + plotW / 2}" y="${H - 22}" text-anchor="middle">1. Viabilidad técnica ponderada</text>
        <text class="axis-label" transform="translate(22 ${margin.top + plotH / 2}) rotate(-90)" text-anchor="middle">2. Viabilidad financiera ponderada</text>
        <g clip-path="url(#strategyPlotClip)">${markers}</g>
    </svg>`;
}


function renderMarkerShape(p, x, y, r, shape, selected, label) {
    const dataAttrs = `data-key="${escapeHtml(p.key)}" data-title="${escapeHtml(p.empresa)}" data-segment="${escapeHtml(p.segmento)}" data-x="${p.x.toFixed(2)}" data-y="${p.y.toFixed(2)}" data-impact="${p.sizeValue.toFixed(2)}"`;
    let shapeHtml = '';
    if (shape === 'square') {
        shapeHtml = `<rect class="marker-shape" x="${x - r}" y="${y - r}" width="${r * 2}" height="${r * 2}" rx="7"></rect>`;
    } else if (shape === 'diamond') {
        const pts = `${x},${y-r} ${x+r},${y} ${x},${y+r} ${x-r},${y}`;
        shapeHtml = `<polygon class="marker-shape" points="${pts}"></polygon>`;
    } else if (shape === 'triangle') {
        const pts = `${x},${y-r*1.1} ${x+r*1.08},${y+r*0.85} ${x-r*1.08},${y+r*0.85}`;
        shapeHtml = `<polygon class="marker-shape" points="${pts}"></polygon>`;
    } else {
        shapeHtml = `<circle class="marker-shape" cx="${x}" cy="${y}" r="${r}"></circle>`;
    }

    return `<g class="marker-group${selected}" ${dataAttrs} onclick="selectStrategyProject(event, '${escapeJs(p.key)}')" onmousedown="event.stopPropagation()" onmousemove="showStrategyTooltip(event, this)" onmouseleave="hideStrategyTooltip()">
        ${shapeHtml}
        <circle class="marker-hit-area" cx="${x}" cy="${y}" r="${Math.max(r + 12, 30)}"></circle>
        <text class="marker-label" x="${x}" y="${y + r + 15}" text-anchor="middle">${escapeHtml(label)}</text>
    </g>`;
}

function getStrategyDomain() {
    return strategyDomain || { ...STRATEGY_DOMAIN_DEFAULT };
}

function getStrategyZoomLevel() {
    const d = getStrategyDomain();
    const zx = (STRATEGY_DOMAIN_DEFAULT.xMax - STRATEGY_DOMAIN_DEFAULT.xMin) / (d.xMax - d.xMin);
    const zy = (STRATEGY_DOMAIN_DEFAULT.yMax - STRATEGY_DOMAIN_DEFAULT.yMin) / (d.yMax - d.yMin);
    return (zx + zy) / 2;
}

function getStrategyDomainLabel() {
    const d = getStrategyDomain();
    return `Rango visible · Técnica: ${d.xMin.toFixed(2)} a ${d.xMax.toFixed(2)} · Financiera: ${d.yMin.toFixed(2)} a ${d.yMax.toFixed(2)}`;
}

function formatAxisTick(v) {
    return Math.abs(v - Math.round(v)) < 0.001 ? String(Math.round(v)) : v.toFixed(1);
}

function niceStrategyTicks(min, max, target = 5) {
    const range = Math.max(0.0001, max - min);
    const rawStep = range / Math.max(1, target - 1);
    const pow = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const normalized = rawStep / pow;
    let step = 1;
    if (normalized <= 1) step = 1;
    else if (normalized <= 2) step = 2;
    else if (normalized <= 5) step = 5;
    else step = 10;
    step *= pow;
    const start = Math.ceil(min / step) * step;
    const ticks = [];
    for (let t = start; t <= max + step * 0.5; t += step) {
        const rounded = Math.round(t * 1000) / 1000;
        if (rounded >= min - 0.0001 && rounded <= max + 0.0001) ticks.push(rounded);
    }
    if (!ticks.length) ticks.push(min, max);
    return ticks.slice(0, 7);
}

function clampStrategyDomain(domain) {
    const def = STRATEGY_DOMAIN_DEFAULT;
    const minRange = 0.65;
    const maxRange = 4;
    let xRange = Math.max(minRange, Math.min(maxRange, domain.xMax - domain.xMin));
    let yRange = Math.max(minRange, Math.min(maxRange, domain.yMax - domain.yMin));
    let xCenter = (domain.xMin + domain.xMax) / 2;
    let yCenter = (domain.yMin + domain.yMax) / 2;

    let xMin = xCenter - xRange / 2;
    let xMax = xCenter + xRange / 2;
    let yMin = yCenter - yRange / 2;
    let yMax = yCenter + yRange / 2;

    if (xMin < def.xMin) { xMax += def.xMin - xMin; xMin = def.xMin; }
    if (xMax > def.xMax) { xMin -= xMax - def.xMax; xMax = def.xMax; }
    if (yMin < def.yMin) { yMax += def.yMin - yMin; yMin = def.yMin; }
    if (yMax > def.yMax) { yMin -= yMax - def.yMax; yMax = def.yMax; }

    return {
        xMin: Math.max(def.xMin, xMin),
        xMax: Math.min(def.xMax, xMax),
        yMin: Math.max(def.yMin, yMin),
        yMax: Math.min(def.yMax, yMax)
    };
}

function clientToStrategyData(clientX, clientY) {
    const wrap = document.getElementById('strategySvgWrap');
    const d = getStrategyDomain();
    if (!wrap) return { x: (d.xMin + d.xMax) / 2, y: (d.yMin + d.yMax) / 2 };
    const rect = wrap.getBoundingClientRect();
    const W = 920, H = 500;
    const margin = { left: 76, right: 36, top: 34, bottom: 70 };
    const sx = ((clientX - rect.left) / rect.width) * W;
    const sy = ((clientY - rect.top) / rect.height) * H;
    const fx = Math.max(0, Math.min(1, (sx - margin.left) / (W - margin.left - margin.right)));
    const fy = Math.max(0, Math.min(1, (sy - margin.top) / (H - margin.top - margin.bottom)));
    return {
        x: d.xMin + fx * (d.xMax - d.xMin),
        y: d.yMax - fy * (d.yMax - d.yMin)
    };
}

function zoomStrategyMap(factor, clientX = null, clientY = null) {
    const current = getStrategyDomain();
    const focus = (clientX !== null && clientY !== null)
        ? clientToStrategyData(clientX, clientY)
        : { x: (current.xMin + current.xMax) / 2, y: (current.yMin + current.yMax) / 2 };

    const newXRange = (current.xMax - current.xMin) * factor;
    const newYRange = (current.yMax - current.yMin) * factor;
    const fx = (focus.x - current.xMin) / (current.xMax - current.xMin);
    const fy = (focus.y - current.yMin) / (current.yMax - current.yMin);

    strategyDomain = clampStrategyDomain({
        xMin: focus.x - fx * newXRange,
        xMax: focus.x + (1 - fx) * newXRange,
        yMin: focus.y - fy * newYRange,
        yMax: focus.y + (1 - fy) * newYRange
    });
    refreshStrategyViewport();
}

function resetStrategyZoom(shouldApply = true) {
    strategyDomain = { ...STRATEGY_DOMAIN_DEFAULT };
    if (shouldApply) refreshStrategyViewport();
}

function setupStrategyZoomEvents() {
    const wrap = document.getElementById('strategySvgWrap');
    if (!wrap) return;

    // Asignar handlers directos evita acumulación de eventos después de cada render.
    wrap.onwheel = function(event) {
        event.preventDefault();
        const factor = event.deltaY < 0 ? 0.88 : 1.14;
        zoomStrategyMap(factor, event.clientX, event.clientY);
    };

    wrap.onmousedown = function(event) {
        if (event.button !== 0) return;
        event.preventDefault();
        strategyPanState = {
            startX: event.clientX,
            startY: event.clientY,
            domain: { ...getStrategyDomain() }
        };
        wrap.classList.add('panning');

        const moveHandler = function(moveEvent) {
            if (!strategyPanState) return;
            const rect = wrap.getBoundingClientRect();
            if (!rect.width || !rect.height) return;
            const startDomain = strategyPanState.domain;
            const W = 920, H = 500;
            const margin = { left: 76, right: 36, top: 34, bottom: 70 };
            const plotW = W - margin.left - margin.right;
            const plotH = H - margin.top - margin.bottom;
            const dx = (moveEvent.clientX - strategyPanState.startX) / rect.width * W;
            const dy = (moveEvent.clientY - strategyPanState.startY) / rect.height * H;
            const xShift = -(dx / plotW) * (startDomain.xMax - startDomain.xMin);
            const yShift = (dy / plotH) * (startDomain.yMax - startDomain.yMin);
            strategyDomain = clampStrategyDomain({
                xMin: startDomain.xMin + xShift,
                xMax: startDomain.xMax + xShift,
                yMin: startDomain.yMin + yShift,
                yMax: startDomain.yMax + yShift
            });
            requestStrategyViewportRefresh();
        };

        const upHandler = function() {
            strategyPanState = null;
            wrap.classList.remove('panning');
            window.removeEventListener('mousemove', moveHandler);
            window.removeEventListener('mouseup', upHandler);
            refreshStrategyViewport();
        };

        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('mouseup', upHandler);
    };
}

function selectStrategyProject(eventOrKey, maybeKey) {
    // Cuando se hace clic en un marcador, detenemos el evento para que el contenedor
    // no lo interprete como inicio de arrastre/pan y no vuelva a pintar antes del click.
    if (eventOrKey && typeof eventOrKey.stopPropagation === 'function') {
        eventOrKey.stopPropagation();
        eventOrKey.preventDefault();
    }

    const key = maybeKey || eventOrKey;
    if (!key) return;

    selectedStrategyProjectKey = String(key);
    const projects = getFilteredStrategyProjects();
    const selectedProject = projects.find(p => p.key === selectedStrategyProjectKey);
    if (!selectedProject) return;

    const svgWrap = document.getElementById('strategySvgWrap');
    if (svgWrap) svgWrap.innerHTML = renderStrategySvg(projects);

    refreshSelectedStrategyKpis(projects);

    const commentsPanel = document.getElementById('strategyCommentsPanel');
    if (commentsPanel) commentsPanel.innerHTML = renderStrategyBottomPanel(selectedProject);

    hideStrategyTooltip();
    setupStrategyZoomEvents();
}

function showStrategyTooltip(event, el) {
    const tooltip = document.getElementById('strategyTooltip');
    if (!tooltip) return;
    tooltip.innerHTML = `<strong>${el.dataset.title}</strong><br>${el.dataset.segment}<br>Técnica: ${el.dataset.x} · Financiera: ${el.dataset.y}<br>Impacto territorial: ${el.dataset.impact}`;
    tooltip.style.left = (event.clientX + 14) + 'px';
    tooltip.style.top = (event.clientY + 14) + 'px';
    tooltip.style.display = 'block';
}

function hideStrategyTooltip() {
    const tooltip = document.getElementById('strategyTooltip');
    if (tooltip) tooltip.style.display = 'none';
}

function renderStrategyProjectDetail(p) {
    if (!p) {
        return `<div class="strategy-empty-hint">Selecciona una iniciativa en el gráfico para ver el detalle.</div>`;
    }
    return `<div class="strategy-side-title"><i class="fa-solid fa-location-crosshairs"></i> Iniciativa seleccionada</div>
        <div class="selected-project-name">${escapeHtml(p.empresa)}</div>
        <div class="selected-project-meta"><i class="fa-solid fa-layer-group"></i> ${escapeHtml(p.segmento)} · ${p.score.total} evaluación${p.score.total === 1 ? '' : 'es'}</div>
        <div class="metric-stack">
            ${renderMetricRow('fa-screwdriver-wrench', '1. Viabilidad técnica', p.tech)}
            ${renderMetricRow('fa-coins', '2. Viabilidad financiera', p.fin)}
            ${renderMetricRow('fa-map-location-dot', '3. Impacto territorial', p.impact)}
            <div class="metric-row">
                <div class="metric-row-label"><i class="fa-solid fa-trophy"></i> Ranking global ponderado</div>
                <div class="metric-row-value">${p.score.weighted.toFixed(2)}</div>
                <div class="metric-row-sub">SHARK ${p.score.sharkAvg !== null ? p.score.sharkAvg.toFixed(2) : '—'} · Público ${p.score.publicoAvg !== null ? p.score.publicoAvg.toFixed(2) : '—'}</div>
            </div>
        </div>
        <div class="strategy-empty-hint">
            Lectura sugerida: las iniciativas más fuertes quedan hacia la esquina superior derecha. El tamaño ayuda a priorizar impacto territorial.
        </div>`;
}

function renderMetricRow(icon, label, metric) {
    return `<div class="metric-row">
        <div class="metric-row-label"><i class="fa-solid ${icon}"></i> ${label}</div>
        <div class="metric-row-value">${metric.weighted !== null ? metric.weighted.toFixed(2) : '—'}</div>
        <div class="metric-row-sub">SHARK ${metric.sharkAvg !== null ? metric.sharkAvg.toFixed(2) : '—'} (${metric.sharkCount}) · Público ${metric.publicoAvg !== null ? metric.publicoAvg.toFixed(2) : '—'} (${metric.publicoCount})</div>
    </div>`;
}

function renderStrategyProjectComments(p) {
    if (!p) {
        return `<div class="strategy-comments-header"><div class="strategy-comments-title"><i class="fa-solid fa-comments"></i> Comentarios de la iniciativa</div></div>
            <div class="strategy-empty-hint">Selecciona una iniciativa para ver sus comentarios.</div>`;
    }
    const count = p.comments.length;
    let html = `<div class="strategy-comments-header">
        <div class="strategy-comments-title"><i class="fa-solid fa-comments"></i> Comentarios de la iniciativa</div>
        <span class="rest-votes">${count} comentario${count === 1 ? '' : 's'}</span>
    </div>`;
    if (count === 0) {
        html += `<div class="strategy-empty-hint">Esta iniciativa no tiene comentarios registrados todavía.</div>`;
        return html;
    }
    html += '<div class="strategy-comments-list">';
    p.comments.sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).forEach(r => {
        const catClass = r.categoria === 'Público' ? 'publico' : '';
        const catBadge = r.categoria === 'Público'
            ? '<span class="cell-cat-badge publico">PÚBLICO</span>'
            : '<span class="cell-cat-badge">SHARK</span>';
        html += `<div class="strategy-comment-mini ${catClass}">
            <div class="strategy-comment-mini-head">
                <div>
                    <div class="strategy-comment-mini-name">${escapeHtml(r.evaluador || '—')}</div>
                    <div class="comment-eval-meta">${formatDateShort(r.fecha)}</div>
                </div>
                ${catBadge}
            </div>
            <div class="strategy-comment-mini-body">${escapeHtml(r.observaciones)}</div>
        </div>`;
    });
    html += '</div>';
    return html;
}

function makeShortLabel(name, fallback) {
    const clean = String(name || '').replace(/EPM Comercial/gi, 'EPM').trim();
    if (!clean) return `I${fallback}`;
    const words = clean.split(/\s+/).filter(Boolean);
    if (words.length === 1) return words[0].substring(0, 12);
    return words.slice(0, 2).map(w => w.substring(0, 6)).join(' ');
}

function escapeJs(s) {
    return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ============================================================
// EXPORTAR CSV
// ============================================================
function exportCSV() {
    if (allRows.length === 0) {
        alert('No hay datos para exportar.');
        return;
    }
    const headers = ['Fecha','Evaluador','Categoría','Segmento','Empresa','Código Empresa','C1','C2','C3','C4','C5','C6','C7','C8','Promedio','Observaciones'];
    const csvRows = [headers.join(',')];
    allRows.forEach(r => {
        const row = [
            r.fecha, r.evaluador, r.categoria, r.segmento, r.empresa, r.empresa_codigo,
            r.c1, r.c2, r.c3, r.c4, r.c5, r.c6, r.c7, r.c8, r.promedio, r.observaciones
        ].map(v => csvEscape(v));
        csvRows.push(row.join(','));
    });
    const csv = '\uFEFF' + csvRows.join('\n'); // BOM para Excel
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `shark_tank_epm_${today}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function csvEscape(v) {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function switchTab(event, id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Inicializar: la actualización queda manual con el botón "Refrescar datos".
loadData();
